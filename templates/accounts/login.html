{% extends "storefront/base.html" %}
{% block title %}Sign In · Single Origin Society{% endblock title %}
{% block content %}
<section class="section">
  <div class="container-narrow auth-form-sm">
    <h1 class="auth-heading">Sign In</h1>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" class="form-control" required autofocus>
      </div>
      <div class="form-group">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" class="form-control" required>
      </div>
      {% if form.errors %}
      <p class="auth-error">Invalid username or password.</p>
      {% endif %}
      <button type="submit" class="btn btn-gold btn-block">Sign In</button>
    </form>
    <p class="auth-footer">
      Don't have an account? <a href="{% url 'accounts:register' %}" class="auth-link">Create one</a>
    </p>
  </div>
</section>
{% endblock content %}
